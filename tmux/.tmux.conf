set -g default-terminal "xterm-256color"

set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

set -s escape-time 0

unbind %
bind v split-window -h

unbind '"'
bind i split-window -v

unbind R
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set -g window-style set-default
set -g window-active-style set-default 

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'

set -g @themepack 'powerline/default/cyan'

# tmux-resurrect settings
set -g @ressurect-strategy-vim 'session'

set -g @continuum-boot 'on'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @reurrect-capture-pane-content 'on'
set -g @continuum-restore 'on'

# Keep file line at the very bottom
run '~/.tmux/plugins/tpm/tpm'

set-option -g window-style "bg=#272524"
set-option -g window-active-style "bg=#000000" 

set-option -g pane-border-lines heavy
set-option -g pane-border-status top
set-option -g pane-border-indicators 
set-option -g pane-active-border-style 'bg=#1f2883 fg=white'


